        :root {
            --bg: #0a0a14;

            --accent: #6366f1;

            --border: rgba(255,255,255,0.08);
            --particle: rgba(99,102,241,0.25);
            --font: 'Plus Jakarta Sans', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s, color 0.5s;
        }
        .particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; }
        .particle {
            position: absolute; border-radius:50%;
            background: var(--particle);
            animation: float linear infinite; filter:blur(2px);
        }
        @keyframes float {
            0%{ transform: translateY(100vh) rotate(0deg); opacity:0; }
            10%{ opacity:0.5; } 90%{ opacity:0.3; }
            100%{ transform: translateY(-20vh) rotate(360deg); opacity:0; }
        }
        .premium-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 1.4rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.6);
        }
        .btn-success { background: #2dd4bf; color:#0a0c10; }
        .btn-danger { background: #f43f5e; color:#fff; }
        .toast {
            position:fixed; top:24px; left:50%; transform:translate(-50%,-20px);
            opacity:0; visibility:hidden; z-index:999; width:90%; max-width:400px; transition:all .4s;
        }
        .toast.show { transform:translate(-50%,0); opacity:1; visibility:visible; }
        .toast-inner {
            padding:1rem; border-radius:16px; background:rgba(20,20,25,0.95);
            border:1px solid rgba(255,255,255,0.15); color:#f4f4f5; font-size:13px;
        }
        .theme-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap:8px;
            max-height: 320px; overflow-y: auto; padding-right: 4px;
        }
        .theme-btn {
            background: var(--card); border:1px solid var(--border); border-radius:12px;
            padding: 8px 4px; text-align:center; font-size:10px; font-weight:bold;
            cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:2px;
        }
        .theme-btn.active { border-color: var(--accent); box-shadow:0 0 15px var(--accent); }

            dam_me: { emoji:'🎸', font:'Rock Salt', bg:'#2d1b2e', card:'rgba(45,27,46,0.8)', text:'#fbcfe8', muted:'#f472b6', accent:'#ec4899', btn:'linear-gradient(135deg,#f472b6,#db2777)', border:'rgba(244,114,182,0.3)', particle:'rgba(244,114,182,0.2)', slogan:'Đam mê cháy bỏng', title:'LNHAT <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400">BYPASS</span>' }
            // ... Đủ 67 theme, bạn có thể tiếp tục thêm vào object trên.
        };

        function applyTheme(key) {
            const t = themes[key] || themes.vui_ve;
            document.documentElement.style.setProperty('--bg', t.bg);
            document.documentElement.style.setProperty('--card', t.card);
            document.documentElement.style.setProperty('--text', t.text);
            document.documentElement.style.setProperty('--muted', t.muted);
            document.documentElement.style.setProperty('--accent', t.accent);
            document.documentElement.style.setProperty('--btn-bg', t.btn);
            document.documentElement.style.setProperty('--border', t.border);
            document.documentElement.style.setProperty('--particle', t.particle);
            document.documentElement.style.setProperty('--font', t.font);
            document.body.style.fontFamily = t.font;
            document.getElementById('mainTitle').innerHTML = t.title;
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === key));
        }

        function setTheme(key) { set(ref(db, 'activeTheme'), key); }

        const themeContainer = document.getElementById('themeContainer');
        for (const [key, t] of Object.entries(themes)) {
            const btn = document.createElement('div');
            btn.className = 'theme-btn';
            btn.dataset.theme = key;
            btn.innerHTML = `${t.emoji}<span>${t.slogan.split(' ')[0]}</span>`;
            btn.onclick = () => setTheme(key);
            themeContainer.appendChild(btn);
        }

        onValue(ref(db, 'activeTheme'), snap => applyTheme(snap.val() || 'vui_ve'));
        const urlTheme = new URLSearchParams(window.location.search).get('theme');
        if (urlTheme) applyTheme(urlTheme);

        async function updateStatus(id, status, reason='') {
            await update(ref(db), {
                ['orders/'+id+'/status']: status,
                ['orders/'+id+'/failReason']: reason
            });
            // Gửi thông báo Discord khi duyệt
            const statusText = status === 'completed' ? '✅ Hoàn thành' : '❌ Thất bại';
            const color = status === 'completed' ? 0x2dd4bf : 0xf43f5e;
            let desc = `\`\`\`${id}\`\`\`\n**Trạng thái:** ${statusText}`;
            if (reason) desc += `\n**Lý do:** ${reason}`;
            sendDiscordEmbed('📋 Đơn hàng đã được duyệt', desc, color);
        }

        const params = new URLSearchParams(window.location.search);
        const quickId = params.get('id');
        if (quickId) {
            document.getElementById('quickReview').classList.remove('hidden');
            document.getElementById('quickIdDisplay').innerText = 'ID: ' + quickId;
            document.getElementById('quickComplete').onclick = async () => {
                await updateStatus(quickId,'completed');
                showToast('Đã duyệt Hoàn thành');
                document.getElementById('quickReview').classList.add('hidden');
            };
            document.getElementById('quickFail').onclick = () => document.getElementById('quickFailReason').classList.toggle('hidden');
            document.getElementById('quickConfirmFail').onclick = async () => {
                const reason = document.getElementById('quickReason').value.trim();
                if (!reason) return showToast('Nhập lý do', false);
                await updateStatus(quickId,'failed', reason);
                showToast('Đã đánh dấu Thất bại');
                document.getElementById('quickReview').classList.add('hidden');
            };
        }

        onValue(ref(db, 'orders'), snap => {
            const all = snap.val() || {};
            const pending = Object.keys(all).filter(id => all[id]?.status === 'pending');
            const container = document.getElementById('pendingOrders');
            if (!pending.length) {
                container.innerHTML = '<div class="text-center py-8" style="color:var(--muted)">Không có đơn nào</div>';
                return;
            }
            let html = '';
            pending.forEach(id => {
                html += `<div class="bg-black/40 border rounded-2xl p-4" style="border-color:var(--border)" data-id="${id}">
                    <div class="font-mono font-bold truncate mb-3">#${id}</div>
                    <div class="flex gap-2">
                        <button class="complete-btn flex-1 py-2 rounded-xl btn-success font-bold text-xs uppercase">Hoàn thành</button>
                        <button class="fail-btn flex-1 py-2 rounded-xl btn-danger font-bold text-xs uppercase">Thất bại</button>
                    </div>
                    <div class="fail-reason mt-2 hidden">
                        <textarea class="w-full bg-black/50 border border-white/10 rounded-xl p-2 text-white text-xs" placeholder="Lý do..."></textarea>
                        <button class="confirm-fail mt-2 w-full py-2 rounded-xl bg-red-700/80 text-white font-bold text-xs uppercase">Xác nhận thất bại</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            container.querySelectorAll('[data-id]').forEach(card => {
                const id = card.dataset.id;
                card.querySelector('.complete-btn').onclick = async () => {
                    await updateStatus(id,'completed');
                    showToast('Đã duyệt #'+id);
                };
                card.querySelector('.fail-btn').onclick = () => card.querySelector('.fail-reason').classList.toggle('hidden');
                card.querySelector('.confirm-fail').onclick = async () => {
                    const reason = card.querySelector('textarea').value.trim();
                    if (!reason) return showToast('Nhập lý do', false);
                    await updateStatus(id,'failed', reason);
                    showToast('Đã đánh dấu Thất bại #'+id);
                };
            });
        });

        (function(){
            const c = document.getElementById('particles');
            for(let i=0;i<20;i++){
                const p = document.createElement('div');
                p.className='particle';
                const s = Math.random()*3+2;
                p.style.width=s+'px'; p.style.height=s+'px';
                p.style.left=Math.random()*100+'%';
                p.style.animationDuration=Math.random()*12+8+'s';
                c.appendChild(p);
            }
        })();
    </script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return false;
            }
        };
        setInterval(() => { if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) document.body.innerHTML = ''; }, 1000);
    </script>
</body>
